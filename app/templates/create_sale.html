<!DOCTYPE html>
<html>

<head>
    <title>Create Sale Invoice - Nohria Dies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .form-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 13px;
            color: #333;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: Arial;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .readonly {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button,
        a {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        button {
            background: #667eea;
            color: white;
        }

        button:hover {
            background: #764ba2;
        }

        a.btn-cancel {
            background: #f0f0f0;
            color: #333;
            display: inline-block;
        }

        a.btn-cancel:hover {
            background: #e0e0e0;
        }

        .back {
            display: inline-block;
            margin-bottom: 15px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        /* Items Table Styles */
        .items-container {
            margin-bottom: 15px;
        }

        .items-table-header {
            background: #667eea;
            color: white;
            padding: 12px 15px;
            border-radius: 6px 6px 0 0;
            font-weight: bold;
            font-size: 13px;
            display: grid;
            grid-template-columns: 40px 2fr 1fr 80px 80px 100px 40px;
            gap: 10px;
            align-items: center;
        }

        .item-row {
            border: 2px solid #e0e0e0;
            border-top: none;
            padding: 12px 15px;
            display: grid;
            grid-template-columns: 40px 2fr 1fr 80px 80px 100px 40px;
            gap: 10px;
            align-items: center;
            background: white;
        }

        .item-row:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .item-row:last-child {
            border-radius: 0 0 6px 6px;
        }

        .sno {
            font-weight: bold;
            color: #667eea;
            text-align: center;
        }

        .taxable-amount {
            font-weight: bold;
            color: #28a745;
        }

        .remove-item {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-item:hover {
            background: #c82333;
        }

        .add-item-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .add-item-btn:hover {
            background: #218838;
        }

        textarea {
            resize: vertical;
            min-height: 40px;
        }
    </style>
</head>

<body>
<div class="container">
    <a href="/sales" class="back">← Back to Sales</a>
    <h1>Create Sale Invoice</h1>

    <form method="POST" id="invoiceForm">
        <!-- Buyer Company -->
        <div class="form-section">
            <h3>Your Company Details</h3>
            <label>Select Your Company *</label>
            <select name="my_company_id" id="myCompany" required onchange="fillMyCompanyDetails()">
                <option value="">-- Select Your Company --</option>
                {% for company in companies %}
                <option value="{{ company.id }}" 
                        data-name="{{ company.company_name }}" 
                        data-gst="{{ company.gst_no }}" 
                        data-state="{{ company.state }}" 
                        data-state-code="{{ company.state_code }}">
                    {{ company.company_name }} ({{ company.gst_no }})
                </option>
                {% endfor %}
            </select>
            <input type="hidden" id="myCompanyName">
            <input type="hidden" id="myCompanyGst">
            <input type="hidden" id="myCompanyState">
            <input type="hidden" id="myStateCode">
        </div>

        <!-- Customer Company -->
        <div class="form-section">
            <h3>Bill To (Customer Company)</h3>
            <label>Select Company *</label>
            <select name="customer_company_id" id="customerCompany" required onchange="fillCustomerDetails()">
                <option value="">-- Select Company --</option>
                {% for company in companies %}
                <option value="{{ company.id }}" 
                        data-name="{{ company.company_name }}" 
                        data-gst="{{ company.gst_no }}" 
                        data-state="{{ company.state }}" 
                        data-state-code="{{ company.state_code }}">
                    {{ company.company_name }} ({{ company.gst_no }})
                </option>
                {% endfor %}
            </select>
            <input type="hidden" id="customerName">
            <input type="hidden" id="customerGst">
            <input type="hidden" id="customerState">
            <input type="hidden" id="customerStateCode">
        </div>
         <!-- Invoice Details -->
        <div class="form-section">
            <h3>Invoice Details</h3>
            <label>Invoice Number *</label>
            <input type="text" name="invoice_number" value="{{ suggested_invoice_number }}" readonly>    
        <label>Invoice Date *</label>
            <input type="date" name="invoice_date" required>
            <label>PO Number</label>
            <input type="text" name="po_number">
            <label>PO Date</label>
            <input type="date" name="po_date">
            <label>Challan No</label>
            <input type="text" name="challan_no">
            <label>Challan Date</label>
            <input type="date" name="challan_date">
            <label>Date & Time of Supply</label>
            <input type="datetime-local" name="supply_datetime">
            <label>E‑Way Bill</label>
            <input type="text" name="eway_bill">
        </div>

        <!-- Items -->
        <div class="form-section">
            <h3>Items</h3>
            <button type="button" onclick="addItemRow()">➕ Add Item Row</button>
            <div id="itemsContainer"></div>
        </div>

        <!-- Totals -->
        <div class="form-section">
            <label>Subtotal</label>
            <input type="number" id="subtotal" name="subtotal" readonly step="0.01">
        </div>

        <div class="form-section">
            <h3>Tax Calculation</h3>
            <label>CGST (9%)</label>
            <input type="number" id="cgst" name="cgst_amount" readonly step="0.01">
            <label>SGST (9%)</label>
            <input type="number" id="sgst" name="sgst_amount" readonly step="0.01">
            <label>IGST (18%)</label>
            <input type="number" id="igst" name="igst_amount" readonly step="0.01">
            <label>Total Tax</label>
            <input type="number" id="totalTax" name="total_tax" readonly step="0.01">
        </div>

        <div class="form-group">
            <label for="freight_charges">Freight Charges</label>
            <input type="number" step="0.01" id="freight_charges" name="freight_charges" value="0">
        </div>

        <div class="form-section" style="background:#667eea; color:white;">
            <label style="color:white;">GRAND TOTAL</label>
            <input type="number" id="grandTotal" name="total_amount" readonly step="0.01"
                   style="background:white; color:#667eea; font-weight:bold;">
        </div>

        <button type="submit">💾 Save Invoice</button>
    </form>
</div>

<script>
let itemCounter = 0;

function addItemRow() {
    itemCounter++;
    const container = document.getElementById('itemsContainer');
    const row = document.createElement('div');
    row.className = 'item-row';
    row.id = `itemRow${itemCounter}`;
    row.innerHTML = `
        <div class="sno">${itemCounter}</div>
        <input type="text" name="items[${itemCounter}][description]" placeholder="Description" onchange="calculateTotals()">
        <input type="text" name="items[${itemCounter}][hsn_no]" placeholder="HSN No" onchange="calculateTotals()">
        <input type="number" name="items[${itemCounter}][qty]" min="1" value="0" onchange="calculateTotals()">
        <input type="number" name="items[${itemCounter}][price]" min="0" step="0.01" value="0" onchange="calculateTotals()">
        <div class="taxable-amount" id="taxable${itemCounter}">0.00</div>
        <button type="button" onclick="removeItemRow(${itemCounter})">×</button>
    `;
    container.appendChild(row);
    calculateTotals();
}

function removeItemRow(id) {
    const row = document.getElementById(`itemRow${id}`);
    if (row) row.remove();
    calculateTotals();
}

function fillMyCompanyDetails() {
    const select = document.getElementById('myCompany');
    const option = select.options[select.selectedIndex];
    if (option && option.value) {
        document.getElementById('myStateCode').value = option.getAttribute('data-state-code') || '';
        calculateTotals();
    }
}

function fillCustomerDetails() {
    const select = document.getElementById('customerCompany');
    const option = select.options[select.selectedIndex];
    if (option && option.value) {
        document.getElementById('customerStateCode').value = option.getAttribute('data-state-code') || '';
        calculateTotals();
    }
}

function calculateTotals() {
    let subtotal = 0;
    document.querySelectorAll('.item-row').forEach(row => {
        const qty = parseFloat(row.querySelector('input[name$="[qty]"]').value) || 0;
        const price = parseFloat(row.querySelector('input[name$="[price]"]').value) || 0;
        const taxable = qty * price;
        const rowId = row.id.replace('itemRow','');
        row.querySelector(`#taxable${rowId}`).textContent = taxable.toFixed(2);
        subtotal += taxable;
    });

    const freight = parseFloat(document.getElementById('freight_charges')?.value) || 0;
    subtotal += freight;
    document.getElementById('subtotal').value = subtotal.toFixed(2);

    const myStateCode = document.getElementById('myStateCode')?.value?.trim();
    const customerStateCode = document.getElementById('customerStateCode')?.value?.trim();

    let cgst=0, sgst=0, igst=0;
    if (myStateCode && customerStateCode) {
        if (myStateCode === customerStateCode) {
            cgst = subtotal * 0.09;
            sgst = subtotal * 0.09;
        } else {
            igst = subtotal * 0.18;
        }
    }

    document.getElementById('cgst').value = cgst.toFixed(2);
    document.getElementById('sgst').value = sgst.toFixed(2);
    document.getElementById('igst').value = igst.toFixed(2);

    const totalTax = cgst + sgst + igst;
    document.getElementById('totalTax').value = totalTax.toFixed(2);

    const grandTotal = subtotal + totalTax;
    document.getElementById('grandTotal').value = grandTotal.toFixed(2);
}

document.addEventListener('DOMContentLoaded', () => {
    addItemRow();
    calculateTotals();
    document.getElementById('freight_charges').addEventListener('input', calculateTotals);
});
</script>
</body>


</html>
