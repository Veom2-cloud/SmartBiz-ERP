<!DOCTYPE html>
<html>
<head>
    <title>Upload Sales CSV</title>
</head>
<body>
    <h2>Upload Sales CSV</h2>
    <form action="/sales/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv" required>
        <button type="submit">Upload</button>
    </form>
</body>
</html>
